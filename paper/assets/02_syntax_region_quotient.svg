<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 930" role="img" aria-labelledby="title desc">
  <title id="title">One Rebis program in syntax, region graph, and nested quotient views</title>
  <desc id="desc">The whiteboard expression over atoms a through f lowers to a graph with directional edges, nested regions, and explicit mediator squares, then collapses to a reversible quotient view.</desc>
  <defs>
    <marker id="arr-c" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#087e99"/></marker>
    <marker id="arr-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#a92a68"/></marker>
    <marker id="arr-k" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#32283c"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#2a1e34" flood-opacity=".12"/></filter>
    <style>
      .bg{fill:#f6f1e7}.panel{fill:#fffdf8;stroke:#d7cdbd;stroke-width:2}.head{font:700 31px ui-serif,Georgia,serif;fill:#251d30}
      .step{font:700 13px system-ui,sans-serif;letter-spacing:.14em;fill:#817687}.copy{font:500 16px system-ui,sans-serif;fill:#62586b}
      .code{font:600 21px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#292033}.code-c{fill:#087e99}.code-m{fill:#a92a68}.code-g{fill:#9b6a00}
      .atom{fill:#fff;stroke:#40364b;stroke-width:3}.atomText{font:700 19px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#2d2537}
      .region{fill:#f7f2fa;fill-opacity:.72;stroke:#786a84;stroke-width:2.5;stroke-dasharray:8 7}.nested{fill:#edf8fa;fill-opacity:.72;stroke:#087e99;stroke-width:2.5}
      .med{fill:#fff3c9;stroke:#ad7900;stroke-width:4}.port{fill:#33283e;stroke:#fff;stroke-width:3}.label{font:700 14px system-ui,sans-serif;fill:#5d5268}
      .edgeF{fill:none;stroke:#087e99;stroke-width:5;marker-end:url(#arr-c)}.edgeB{fill:none;stroke:#a92a68;stroke-width:5;marker-end:url(#arr-m)}
      .edgeK{fill:none;stroke:#32283c;stroke-width:4;marker-end:url(#arr-k)}.thin{fill:none;stroke:#95899e;stroke-width:2.5;stroke-dasharray:6 6}
      .pill{fill:#292033}.pillText{font:700 14px system-ui,sans-serif;fill:#fff;letter-spacing:.08em}
    </style>
  </defs>
  <rect width="1680" height="930" class="bg"/>
  <text x="840" y="62" text-anchor="middle" class="head">The whiteboard describes three views of one value</text>
  <text x="840" y="94" text-anchor="middle" class="copy">Source preserves intent · the region graph makes execution explicit · the quotient makes scale manageable without erasing provenance</text>

  <!-- source view -->
  <g transform="translate(45 130)">
    <rect width="465" height="705" rx="24" class="panel" filter="url(#shadow)"/>
    <text x="32" y="48" class="step">01 · SURFACE SYNTAX</text>
    <text x="32" y="89" class="head">A nested prefix term</text>
    <rect x="26" y="122" width="413" height="348" rx="16" fill="#27202f"/>
    <text x="54" y="170" class="code" fill="#e9e0ef">(</text><text x="72" y="170" class="code code-g">~</text>
    <text x="82" y="218" class="code" fill="#e9e0ef">(</text><text x="100" y="218" class="code code-c">-&gt;</text><text x="138" y="218" class="code" fill="#e9e0ef"> a b)</text>
    <text x="82" y="266" class="code" fill="#e9e0ef">(</text><text x="100" y="266" class="code code-m">&lt;-</text><text x="138" y="266" class="code" fill="#e9e0ef"> c d)</text>
    <text x="82" y="314" class="code" fill="#e9e0ef">(</text><text x="100" y="314" class="code code-g">~</text>
    <text x="110" y="362" class="code" fill="#e9e0ef">(</text><text x="128" y="362" class="code code-m">&lt;-</text><text x="166" y="362" class="code" fill="#e9e0ef"> e f)))</text>
    <path d="M43 405 Q28 296 43 188" fill="none" stroke="#cbbbd4" stroke-width="3"/>
    <path d="M67 386 Q54 314 67 291" fill="none" stroke="#cbbbd4" stroke-width="3"/>
    <text x="32" y="515" class="label">The AST retains:</text>
    <text x="48" y="550" class="copy">• source spans and operand order</text>
    <text x="48" y="582" class="copy">• every explicit group boundary</text>
    <text x="48" y="614" class="copy">• directional versus symmetric intent</text>
    <text x="48" y="646" class="copy">• the nested mediation around e ← f</text>
    <rect x="32" y="665" width="260" height="28" rx="14" class="pill"/>
    <text x="162" y="684" text-anchor="middle" class="pillText">PARSE · DO NOT FLATTEN</text>
  </g>

  <path d="M523 482 H566" class="edgeK"/>

  <!-- lowered graph -->
  <g transform="translate(580 130)">
    <rect width="550" height="705" rx="24" class="panel" filter="url(#shadow)"/>
    <text x="32" y="48" class="step">02 · REBIS-REGION-V1</text>
    <text x="32" y="89" class="head">A typed region graph</text>

    <ellipse cx="176" cy="205" rx="112" ry="72" class="region"/>
    <text x="92" y="147" class="label">R₁ forward</text>
    <circle cx="128" cy="204" r="27" class="atom"/><text x="128" y="211" text-anchor="middle" class="atomText">a</text>
    <circle cx="224" cy="204" r="27" class="atom"/><text x="224" y="211" text-anchor="middle" class="atomText">b</text>
    <path d="M155 204 H194" class="edgeF"/>
    <circle cx="290" cy="204" r="10" class="port"/><text x="306" y="210" class="label">p₁</text>
    <path d="M251 204 H280" class="thin"/>

    <ellipse cx="176" cy="407" rx="112" ry="72" class="region"/>
    <text x="88" y="349" class="label">R₂ backflow</text>
    <circle cx="128" cy="406" r="27" class="atom"/><text x="128" y="413" text-anchor="middle" class="atomText">c</text>
    <circle cx="224" cy="406" r="27" class="atom"/><text x="224" y="413" text-anchor="middle" class="atomText">d</text>
    <path d="M197 406 H158" class="edgeB"/>
    <circle cx="290" cy="406" r="10" class="port"/><text x="306" y="412" class="label">p₂</text>
    <path d="M251 406 H280" class="thin"/>

    <ellipse cx="185" cy="595" rx="135" ry="76" class="nested"/>
    <text x="70" y="538" class="label">R₃ nested mediate</text>
    <circle cx="125" cy="593" r="27" class="atom"/><text x="125" y="600" text-anchor="middle" class="atomText">e</text>
    <circle cx="221" cy="593" r="27" class="atom"/><text x="221" y="600" text-anchor="middle" class="atomText">f</text>
    <path d="M194 593 H155" class="edgeB"/>
    <rect x="273" y="570" width="42" height="46" rx="7" class="med"/>
    <path d="M248 593 H273" class="thin"/>
    <text x="294" y="600" text-anchor="middle" class="atomText">□</text>

    <!-- outer mediator, receives region ports rather than flattened atoms -->
    <rect x="414" y="316" width="62" height="72" rx="10" class="med"/>
    <text x="445" y="360" text-anchor="middle" class="atomText">□</text>
    <path d="M300 204 C375 204 366 330 414 342" class="thin"/>
    <path d="M300 406 C365 406 374 370 414 362" class="thin"/>
    <path d="M315 593 C435 593 490 470 461 388" class="thin"/>
    <circle cx="506" cy="352" r="11" class="port"/>
    <path d="M476 352 H495" class="thin"/>
    <text x="485" y="290" text-anchor="middle" class="label">outer common</text>
    <text x="485" y="309" text-anchor="middle" class="label">ground</text>
    <text x="32" y="686" class="copy">Squares are explicit mediator records. Region ports let an</text>
    <text x="32" y="712" class="copy">operator consume a composite without discarding its interior.</text>
  </g>

  <path d="M1143 482 H1186" class="edgeK"/>

  <!-- quotient view -->
  <g transform="translate(1200 130)">
    <rect width="435" height="705" rx="24" class="panel" filter="url(#shadow)"/>
    <text x="32" y="48" class="step">03 · REVERSIBLE QUOTIENT</text>
    <text x="32" y="89" class="head">Nested regions at scale</text>

    <ellipse cx="218" cy="365" rx="170" ry="242" fill="#faf5fc" stroke="#75647e" stroke-width="3"/>
    <text x="218" y="145" text-anchor="middle" class="label">Q(root mediation)</text>

    <ellipse cx="158" cy="245" rx="92" ry="58" fill="#edf8fa" stroke="#087e99" stroke-width="3"/>
    <text x="158" y="239" text-anchor="middle" class="atomText">R₁</text>
    <text x="158" y="263" text-anchor="middle" class="label">a → b</text>
    <ellipse cx="282" cy="367" rx="92" ry="58" fill="#faedf3" stroke="#a92a68" stroke-width="3"/>
    <text x="282" y="361" text-anchor="middle" class="atomText">R₂</text>
    <text x="282" y="385" text-anchor="middle" class="label">c ← d</text>
    <path d="M213 289 C240 306 244 321 254 329" class="edgeF"/>

    <ellipse cx="165" cy="510" rx="104" ry="72" fill="#fff8df" stroke="#ad7900" stroke-width="3"/>
    <text x="165" y="485" text-anchor="middle" class="label">nested Q₃</text>
    <rect x="119" y="504" width="92" height="36" rx="8" fill="#fff" stroke="#a92a68" stroke-width="2.5"/>
    <text x="165" y="528" text-anchor="middle" class="atomText">e ← f</text>
    <path d="M238 411 C231 449 207 461 196 471" class="edgeK"/>

    <rect x="312" y="494" width="42" height="46" rx="7" class="med"/>
    <text x="333" y="524" text-anchor="middle" class="atomText">□</text>
    <path d="M266 510 H312" class="thin"/>

    <text x="32" y="631" class="copy">A quotient replaces each child region with a port.</text>
    <text x="32" y="657" class="copy">It is a view, not a destructive rewrite:</text>
    <text x="48" y="687" class="copy">• every port names its source RegionId</text>
    <text x="48" y="715" class="copy">• source spans and evidence refs survive</text>
    <text x="48" y="743" class="copy">• expansion recovers the same typed subgraph</text>
    <rect x="32" y="770" width="278" height="28" rx="14" class="pill"/>
    <text x="171" y="789" text-anchor="middle" class="pillText">COLLAPSE · INSPECT · REOPEN</text>
  </g>

  <text x="840" y="884" text-anchor="middle" class="copy">Invariant: lowering may add IDs, ports, and mediator records; it may not invent atoms, reverse an arrow, or erase a group boundary.</text>
</svg>
