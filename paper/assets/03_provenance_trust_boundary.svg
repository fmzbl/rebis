<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1540 920" role="img" aria-labelledby="title desc">
  <title id="title">Rebis provenance and trust boundary</title>
  <desc id="desc">Authoritative evidence enters a pure evaluator. A bounded agent may write provisional hypotheses to a separate ledger, but only independent gate evidence can authorize a later transaction that creates a new snapshot. There is no direct proposal-to-commit path.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#3e3448"/></marker>
    <marker id="arr-c" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#087e99"/></marker>
    <marker id="arr-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#a92a68"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#2a1e34" flood-opacity=".13"/></filter>
    <style>
      .bg{fill:#f6f1e7}.title{font:700 40px ui-serif,Georgia,serif;fill:#251d30}.sub{font:500 19px system-ui,sans-serif;fill:#6c6274}
      .head{font:700 23px system-ui,sans-serif;fill:#292033}.cap{font:700 13px system-ui,sans-serif;letter-spacing:.13em;fill:#7c7184}
      .copy{font:500 16px system-ui,sans-serif;fill:#554b5e}.code{font:600 15px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#302638}
      .card{fill:#fffdf8;stroke:#d7ccbd;stroke-width:2}.auth{fill:#edf8fa;stroke:#087e99;stroke-width:3}.prov{fill:#fff6d9;stroke:#ad7900;stroke-width:3}
      .gate{fill:#faedf3;stroke:#a92a68;stroke-width:3}.eval{fill:#f4eef7;stroke:#5c4b68;stroke-width:3}.arrow{fill:none;stroke:#3e3448;stroke-width:4;marker-end:url(#arr)}
      .arrowC{fill:none;stroke:#087e99;stroke-width:4;marker-end:url(#arr-c)}.arrowM{fill:none;stroke:#a92a68;stroke-width:4;marker-end:url(#arr-m)}
      .dash{fill:none;stroke:#aa9eae;stroke-width:3;stroke-dasharray:8 7}.stop{fill:#b12a45}.stopText{font:800 21px system-ui,sans-serif;fill:#fff}
      .pill{fill:#292033}.pillText{font:700 13px system-ui,sans-serif;fill:#fff;letter-spacing:.08em}
    </style>
  </defs>
  <rect width="1540" height="920" class="bg"/>
  <text x="770" y="62" text-anchor="middle" class="title">A hypothesis is not gate evidence</text>
  <text x="770" y="96" text-anchor="middle" class="sub">Rebis makes provenance part of the value, then keeps proposal, verification, and admission in different transactions.</text>

  <!-- authoritative snapshot -->
  <g transform="translate(58 156)">
    <rect width="360" height="360" rx="24" class="card" filter="url(#shadow)"/>
    <text x="28" y="44" class="cap">IMMUTABLE INPUT</text>
    <text x="28" y="82" class="head">Authoritative snapshot S₀</text>
    <rect x="28" y="112" width="304" height="64" rx="12" class="auth"/>
    <text x="47" y="138" class="code">evidence_id: evt/184</text><text x="47" y="160" class="code">digest: 9b… · origin: journal</text>
    <rect x="28" y="190" width="304" height="64" rx="12" class="auth"/>
    <text x="47" y="216" class="code">evidence_id: git/a1f</text><text x="47" y="238" class="code">digest: d2… · origin: repository</text>
    <rect x="28" y="268" width="304" height="64" rx="12" class="auth"/>
    <text x="47" y="294" class="code">policy_id: local/v3</text><text x="47" y="316" class="code">revision + admission lineage</text>
    <text x="28" y="347" class="copy">“Authoritative” means eligible under policy,</text>
    <text x="28" y="369" class="copy">not guaranteed true.</text>
  </g>

  <!-- evaluator -->
  <g transform="translate(540 156)">
    <rect width="400" height="360" rx="24" class="eval" filter="url(#shadow)"/>
    <text x="28" y="44" class="cap">PURE CORE</text>
    <text x="28" y="82" class="head">parse → lower → evaluate</text>
    <rect x="28" y="112" width="344" height="76" rx="14" fill="#fff" stroke="#75657e" stroke-width="2"/>
    <text x="49" y="141" class="code">eval(program, S₀) → report</text>
    <text x="49" y="168" class="code">same inputs ⇒ byte-stable trace</text>
    <text x="28" y="227" class="copy">Scores read only S₀. Every evidence item in</text>
    <text x="28" y="253" class="copy">a result is an EvidenceRef with a digest.</text>
    <text x="28" y="291" class="copy">An unsupported Forward node becomes a gap;</text>
    <text x="28" y="317" class="copy">the evaluator neither calls a model nor writes.</text>
    <rect x="28" y="329" width="190" height="28" rx="14" class="pill"/>
    <text x="123" y="348" text-anchor="middle" class="pillText">NO AMBIENT EFFECTS</text>
  </g>

  <path d="M418 336 H528" class="arrowC"/>
  <text x="473" y="316" text-anchor="middle" class="cap">READ</text>

  <!-- provisional ledger -->
  <g transform="translate(1062 156)">
    <rect width="420" height="360" rx="24" class="card" filter="url(#shadow)"/>
    <text x="28" y="44" class="cap">SEPARATE EFFECT DOMAIN</text>
    <text x="28" y="82" class="head">Provisional proposal ledger</text>
    <rect x="28" y="112" width="364" height="90" rx="14" class="prov"/>
    <text x="48" y="139" class="code">proposal_id: hyp/27</text><text x="48" y="163" class="code">derived_from: gap/5 + model digest</text><text x="48" y="187" class="code">authority: provisional</text>
    <text x="28" y="241" class="copy">The bounded host may append a hypothesis.</text>
    <text x="28" y="267" class="copy">It cannot relabel it authoritative, count it as</text>
    <text x="28" y="293" class="copy">independent support, or mutate S₀.</text>
    <rect x="28" y="317" width="252" height="28" rx="14" fill="#9c6a00"/>
    <text x="154" y="336" text-anchor="middle" class="pillText">VISIBLE · AUDITABLE · UNTRUSTED</text>
  </g>

  <path d="M940 270 C996 270 998 270 1050 270" class="arrow"/>
  <text x="996" y="248" text-anchor="middle" class="cap">GAP → HOST</text>

  <!-- explicit forbidden shortcut -->
  <path d="M1272 516 V615" class="dash"/>
  <circle cx="1272" cy="566" r="25" class="stop"/>
  <text x="1272" y="574" text-anchor="middle" class="stopText">×</text>
  <text x="1310" y="561" class="copy">no proposal-to-commit</text>
  <text x="1310" y="583" class="copy">shortcut</text>

  <!-- independent gate -->
  <g transform="translate(426 620)">
    <rect width="688" height="224" rx="24" class="gate" filter="url(#shadow)"/>
    <text x="28" y="44" class="cap">EXTERNAL TRUST BOUNDARY</text>
    <text x="28" y="82" class="head">Independent gate evidence + admission policy</text>
    <text x="28" y="119" class="copy">A test result, human decision, signed source, or frozen verifier supplies evidence</text>
    <text x="28" y="145" class="copy">that was not authored by the proposal being judged. Policy may reject, defer, or admit.</text>
    <rect x="28" y="169" width="632" height="38" rx="9" fill="#fff" stroke="#a92a68" stroke-width="2"/>
    <text x="344" y="194" text-anchor="middle" class="code">admit(S₀, hyp/27, gate/91, policy/v3) → S₁  |  reject  |  defer</text>
  </g>

  <path d="M1272 516 C1272 648 1177 682 1126 700" class="arrowM"/>
  <text x="1214" y="664" text-anchor="middle" class="cap">PRESENT, NOT COMMIT</text>
  <path d="M540 516 C514 560 512 581 535 608" class="arrowM"/>
  <text x="469" y="570" class="cap">REPORT + REFS</text>
  <path d="M426 733 C263 733 228 658 238 526" class="arrowC"/>
  <text x="264" y="703" text-anchor="middle" class="cap">NEW TRANSACTION S₁</text>

  <text x="770" y="886" text-anchor="middle" class="sub">A gate may authorize a later snapshot. It never retroactively changes the evidence or score of the run that produced the proposal.</text>
</svg>
